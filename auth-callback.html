<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>登录回调 - 洛谷保存站 - 追忆版</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f8fafc; }
    .card { background: white; border-radius: 10px; padding: 40px; box-shadow: 2px 2px 4px #e4e4e4; text-align: center; max-width: 400px; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h2 { color: #2c3e50; }
    p { color: gray; }
  </style>
</head>
<body>
  <div class="card">
    <div class="loader"></div>
    <h2>正在登录...</h2>
    <p>请稍候，正在处理登录凭据</p>
  </div>
  <script>
    (function () {
      const basePath = location.pathname.startsWith('/luogu-saver-recall') ? '/luogu-saver-recall' : '';
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const rawRedirect = params.get('redirect') || '/';
      const redirect = rawRedirect.startsWith('/') ? basePath + rawRedirect : rawRedirect;
      if (token) {
        localStorage.setItem('auth_token', token);
        window.location.href = redirect;
      } else {
        const error = params.get('error') || '登录失败，未获取到凭据';
        document.body.innerHTML = '<div class="card"><h2 style="color:#e74c3c;">登录失败</h2><p>' + error + '</p><a href="' + basePath + '/" class="btn">返回主页</a></div>';
      }
    })();
  </script>
</body>
</html>
